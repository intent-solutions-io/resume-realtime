name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          toolchain: nightly
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build (SSR)
        run: cargo build --features ssr

      - name: Build (Hydrate/WASM)
        run: cargo build --target wasm32-unknown-unknown --features hydrate

      - name: Test
        run: cargo test --features ssr

  docs-lint:
    name: Documentation Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check 000-docs is flat
        run: |
          if find 000-docs -mindepth 2 -type f | grep -q .; then
            echo "ERROR: 000-docs contains subdirectories!"
            exit 1
          fi
          echo "000-docs is flat"

      - name: Check doc filename convention
        run: |
          for f in 000-docs/*.md; do
            if [[ ! $(basename "$f") =~ ^[0-9]{3}-[A-Z]{2}-[A-Z]{4}-.+\.md$ ]]; then
              echo "ERROR: Invalid filename: $f"
              exit 1
            fi
          done
          echo "All doc filenames valid"
